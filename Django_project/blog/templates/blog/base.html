{%load static%}
<!DOCTYPE html>
<html>
    <head>
          {%if title%}
        <title>Django-{{title}}</title>
        {%else%}
        <title>Django-block</title>
        {%endif%}
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{% static 'blog/main.css' %}" type="text/css">
    <style>

    </style>
    </head>
    <body>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
          <div class="container-fluid">
            <a class="navbar-brand" href="#">BlogPage</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-dark navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="{%url 'blog-home' %}">Home</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Features</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{%url 'blog-about' %}">Blog-About</a>
                </li>
              </ul>

              <div class="d-flex">
                <ul class="navbar-nav">
                  <li class="nav-item">
                    <a class="nav-link btn btn-outline-light text-white px-3 mx-1" href="{%url 'admin:index'%}">Login</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link btn btn-primary text-white px-3 mx-1" href="#">Sign Up</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
         </nav>

        <main role="main" class="container mt-4">
    <div class="row">
        <div class="col-md-8">
            {% block content %}
            {% endblock %}
        </div>

        <div class="col-md-4">
            <div class="content-section">
                <h3>Our Sidebar</h3>
                <p class="text-muted">
                    Latest Posts, Announcements, etc.
                </p>
            </div>
        </div>
    </div>
</main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
